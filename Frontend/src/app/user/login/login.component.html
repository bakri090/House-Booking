<div class="row">
  <div class="col-6 m-auto">
    <div class="card m-auto">
      <div class="card-header bg-success text-white">
        Login
      </div>
        <div class="card-body">
          <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">
            <div class="form-group col-12">
              <label for="name">Name</label>
              <input class="form-control" required ngModel name="userName">
            </div>
            <div class="form-group col-12 ">
              <label for="password">Password</label>
              <input class="form-control" type="password"  ngModel name="password" required minlength="6">
            </div>
            <div class="form-group col-12 mt-4">
              <button [disabled]="loginForm.invalid" type="submit" class="btn btn-success me-2">Login</button>
              <button type="button" class="btn btn-secondary ml-2">Cancel</button>
            </div>
          </form>
        </div>
    </div>
  </div>
</div>
